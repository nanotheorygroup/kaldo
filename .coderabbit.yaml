# CodeRabbit configuration for nanotheorygroup/kaldo
# Docs: https://docs.coderabbit.ai/reference/yaml-template

language: en-US
early_access: false
tone_instructions: >
  Concise and technical. Scientific Python library for thermal transport.
  Prioritize numerical correctness, dtype, GPU/CPU dispatch. Avoid cosmetic
  nitpicks; respect flake8/yapf line length of 119.

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  in_progress_fortune: false
  review_status: true
  collapse_walkthrough: true
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
  path_filters:
    # Exclude generated, vendored, and noisy paths — focus the review on source
    - "!kaldo/_version.py"
    - "!versioneer.py"
    - "!kaldo/tests/**/*.npy"
    - "!kaldo/tests/**/*.h5"
    - "!kaldo/tests/**/*.hdf5"
    - "!kaldo/tests/**/*.dat"
    - "!kaldo/tests/**/*.in"
    - "!kaldo/tests/**/*.out"
    - "!kaldo/tests/**/POSCAR*"
    - "!kaldo/tests/**/CONTCAR*"
    - "!kaldo/tests/**/CHGCAR*"
    - "!docs/**"
    - "!examples_local/**"
    - "!build/**"
    - "!dist/**"
    - "!*.egg-info/**"
    - "!.circleci/**"
  path_instructions:
    - path: "**"
      instructions: >
        Flag any commit message or PR description containing AI-attribution
        trailers such as `Co-Authored-By: Claude`, `Co-Authored-By: <…>
        @anthropic.com`, `Generated with Claude Code`, or a 🤖 emoji
        followed by a Claude reference. Request removal before merge —
        this project does not record AI co-authorship in git history.
    - path: "kaldo/**/*.py"
      instructions: >
        Flag float comparisons with `==` (use `np.isclose` / `np.allclose`),
        silent dtype downgrades from float64 to float32, and chained
        np.dot/np.tensordot where np.einsum / opt_einsum.contract would be
        clearer. TensorFlow is a hard dependency in kaldo — top-level
        `import tensorflow as tf` is the project convention; do not flag
        it or suggest deferred imports.
    - path: "kaldo/**/*.py"
      instructions: >
        Apply DRY: flag duplicated logic across functions/modules that
        should be extracted into a shared helper. Apply YAGNI: flag
        speculative abstractions, unused parameters, premature config
        knobs, and code paths added for hypothetical future needs rather
        than current requirements.
    - path: "kaldo/**/*.py"
      instructions: >
        Flag single-letter or cryptic variable names outside tight
        numerical loops (e.g. `tmp`, `data1`, `x`, `arr`) and ALL_CAPS
        names that aren't module-level constants. Prefer descriptive
        snake_case (e.g. `phonon_frequencies` over `pf` or `PhononFreq`).
        Math symbols (`q`, `omega`, `gamma`) are fine when they match
        the physics paper notation.
    - path: "kaldo/tests/**/*.py"
      instructions: >
        Tests should use np.testing.assert_allclose with explicit rtol/atol
        chosen for the physics, not whatever makes them pass. Use tmp_path for
        any filesystem writes. Don't mock the filesystem to substitute for
        reference data files in sibling directories (si-crystal/, mgo/, etc.).
    - path: "examples/**"
      instructions: >
        Block any new or modified files under examples/. kaldo's examples
        live in nanotheorygroup/kaldo-examples — request the contributor
        move the change there. Flag this as a blocker, not a nitpick:
        re-introducing an examples/ folder in this repo is out of scope.
  pre_merge_checks:
    docstrings:
      mode: warning
      threshold: 60
  tools:
    ruff:
      enabled: false
    languagetool:
      enabled: false
    markdownlint:
      enabled: false

chat:
  auto_reply: true
